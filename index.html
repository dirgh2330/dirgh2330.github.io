<!DOCTYPE html>
<html lang="en">
<head>

    <title>Dirgh Patel | Security Analyst</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --accent2: #06b6d4;
            --accent-dark: #2563eb;
            --green: #10b981;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #334155;
            --text-light: #64748b;
            --border: #e2e8f0;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.65;
        }

        /* -- Navigation -- */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 100;
            background: rgba(15, 23, 42, 0.97);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(59,130,246,0.15);
            padding: 0 2rem;
        }
        nav .nav-inner {
            max-width: 1100px; margin: auto;
            display: flex; align-items: center; justify-content: space-between;
            height: 62px;
        }
        nav .logo { color: #fff; font-weight: 800; font-size: 1.2rem; text-decoration: none; letter-spacing: -0.5px; }
        nav .logo span { color: var(--accent); }
        nav ul { list-style: none; display: flex; gap: 1.8rem; }
        nav a { color: #94a3b8; text-decoration: none; font-size: 0.88rem; font-weight: 500; transition: color .2s; letter-spacing: 0.02em; }
        nav a:hover { color: #fff; }
        .hamburger { display: none; background: none; border: none; cursor: pointer; }
        .hamburger span { display: block; width: 22px; height: 2px; background: #fff; margin: 5px 0; transition: .3s; }

        /* -- Hero -- */
        .hero {
            min-height: 100vh;
            padding: 7rem 2rem 5rem;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f2044 100%);
            color: #fff;
            text-align: center;
            position: relative;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        /* animated grid background */
        .hero::before {
            content: "";
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(59,130,246,0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59,130,246,0.06) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridPan 20s linear infinite;
        }
        @keyframes gridPan { from { background-position: 0 0; } to { background-position: 50px 50px; } }

        /* floating orbs */
        .hero::after {
            content: "";
            position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 70%);
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            animation: pulse 4s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100% { transform: translate(-50%,-50%) scale(1); } 50% { transform: translate(-50%,-50%) scale(1.1); } }

        .hero-inner { max-width: 780px; margin: auto; position: relative; z-index: 2; }

        /* avatar ring */
        .avatar-wrap {
            position: relative; display: inline-block;
            margin-bottom: 1.8rem;
        }
        .avatar-wrap::before {
            content: "";
            position: absolute; inset: -6px;
            border-radius: 50%;
            background: conic-gradient(var(--accent), var(--accent2), var(--green), var(--accent));
            animation: spin 4s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .avatar-wrap::after {
            content: "";
            position: absolute; inset: -3px;
            border-radius: 50%;
            background: #0f172a;
        }
        .avatar {
            position: relative; z-index: 1;
            width: 140px; height: 140px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
        }

        .hero h1 {
            font-size: 3rem; font-weight: 800; margin-bottom: 0.4rem;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 40%, #93c5fd);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .tagline {
            font-size: 1rem; color: var(--accent2); font-weight: 600;
            letter-spacing: 0.05em; text-transform: uppercase;
            margin-bottom: 0.6rem;
        }
